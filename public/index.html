<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Browser</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span id="site-title">File Browser</span>
        </div>
        <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <button class="btn-logout" id="btn-logout" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="main">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
        <ol class="breadcrumb-list" id="breadcrumb-list">
          <li class="breadcrumb-item">
            <button class="breadcrumb-btn" data-prefix="">Root</button>
          </li>
        </ol>
      </nav>

      <!-- Search bar -->
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" class="search-input" placeholder="Search files..." />
        <button class="btn-search" id="btn-search">Search</button>
      </div>

      <!-- Search results heading -->
      <div class="search-heading hidden" id="search-heading">
        <span id="search-heading-text"></span>
        <button class="btn-clear-search" id="btn-clear-search">Clear search</button>
      </div>

      <!-- File list container -->
      <div class="panel" id="panel">
        <div class="panel-header">
          <label class="select-all-wrap">
            <input type="checkbox" id="select-all" class="file-checkbox" />
          </label>
          <span class="col-name">Name</span>
          <span class="col-size">Size</span>
          <span class="col-date">Modified</span>
          <span class="col-action"></span>
        </div>
        <div id="file-list" class="file-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Pagination controls -->
      <div class="pagination hidden" id="pagination">
        <button class="btn-page" id="btn-prev">Previous</button>
        <span class="page-indicator" id="page-indicator">Page 1 of 1</span>
        <button class="btn-page" id="btn-next">Next</button>
        <select class="page-size-select" id="page-size-select">
          <option value="50">50 / page</option>
          <option value="100" selected>100 / page</option>
          <option value="200">200 / page</option>
        </select>
      </div>

      <!-- Floating action bar for multi-select -->
      <div class="selection-bar hidden" id="selection-bar">
        <span id="selection-count">0 files selected</span>
        <button class="btn-download-selected" id="btn-download-selected">Download selected</button>
        <button class="btn-clear-selection" id="btn-clear-selection">Clear selection</button>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
        <p>This folder is empty</p>
      </div>

      <!-- Error state -->
      <div id="error-state" class="error-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p id="error-message">Failed to load contents.</p>
      </div>

      <!-- Loading state -->
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
      </div>

    </main>

    <footer class="footer">
      <span id="item-count"></span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Log Dashboard — Sign In</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>

  <div class="page">

    <!-- Left panel — branding (always dark) -->
    <div class="brand-panel">
      <!-- Particle canvas lives inside the brand panel -->
      <div id="particles-js"></div>
      <div class="brand-content">

        <!-- Real Logile logo (white version for dark panel) -->
        <div class="brand-logo">
          <img
            src="https://images.prismic.io/logile/aLsNA2GNHVfTOtul_Logile-NoTagline-White--1-.png?auto=format,compress&fit=max&w=400"
            alt="Logile"
            class="logile-logo"
          />
        </div>

        <!-- App name badge -->
        <div class="app-badge">
          <span class="app-badge-dot"></span>
          Service Log Dashboard
        </div>

        <div class="brand-tagline">
          <h1>One platform.<br/>One plan.<br/>Every shift, shelf, and store in sync.</h1>
        </div>

        <div class="brand-pills">
          <span class="pill">S3 Records</span>
          <span class="pill">Application Logs</span>
          <span class="pill">Service Dashboard</span>
        </div>
      </div>
      <div class="brand-glow"></div>
    </div>

    <!-- Right panel — login form -->
    <div class="form-panel">
      <div class="form-card">

        <!-- Mobile logo (shown only on small screens) -->
        <div class="mobile-logo">
          <!-- Dark logo for light mode, white for dark mode -->
          <img
            src="https://images.prismic.io/logile/aLsMtmGNHVfTOttw_Logile-NoTagline-Dark--1-.png?auto=format,compress&fit=max&w=300"
            alt="Logile"
            class="logile-logo mobile-logo-dark"
          />
          <img
            src="https://images.prismic.io/logile/aLsNA2GNHVfTOtul_Logile-NoTagline-White--1-.png?auto=format,compress&fit=max&w=300"
            alt="Logile"
            class="logile-logo mobile-logo-white"
          />
        </div>

        <div class="form-header">
          <p class="form-app-name">Service Log Dashboard</p>
          <h2>Welcome back</h2>
          <p class="form-sub">Sign in to your account to continue</p>
        </div>

        <form id="login-form" novalidate>

          <div class="field-group">
            <label for="email" class="field-label">Email address</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                id="email"
                name="email"
                class="field-input"
                placeholder="you@logile.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">Password</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input
                type="password"
                id="password"
                name="password"
                class="field-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error message -->
          <div class="error-msg hidden" id="error-msg" role="alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="error-text"></span>
          </div>

          <button type="submit" class="btn-signin" id="btn-signin">
            <span class="btn-label">Sign In</span>
            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
            <span class="btn-spinner hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 110 20 10 10 0 010-20z" stroke-opacity="0.25"/>
                <path d="M12 2a10 10 0 0110 10"/>
              </svg>
            </span>
          </button>

        </form>

        <p class="form-footer">
          Access is managed by DevOps.<br/>
          Contact <a href="devops.dev@logile.com">devops.dev@logile.com</a> for account issues.
        </p>

      </div>
    </div>

  </div>

  <script src="particles.js"></script>
  <script src="login.js"></script>
</body>
</html>
